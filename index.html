<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Tracker d'Épargne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede8;
      --text: #1a1a18;
      --text2: #6b6b67;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --green: #0F6E56;
      --green-bg: #EAF3DE;
      --blue: #185FA5;
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #f0ede6;
        --text2: #9a9892;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.20);
        --green: #5DCAA5;
        --green-bg: #085041;
        --blue: #85B7EB;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
    }

    /* HEADER */
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 24px; font-weight: 600; }
    .header p { font-size: 14px; color: var(--text2); margin-top: 4px; }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .stat-value { font-size: 20px; font-weight: 600; color: var(--text); }
    .stat-value.green { color: var(--green); }
    .stat-value.blue  { color: var(--blue); }

    /* FORM */
    .form-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .form-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    @media (max-width: 440px) { .form-row { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--text2); }
    .form-full { grid-column: 1 / -1; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: #1D9E75;
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
    }
    .form-group textarea { resize: vertical; min-height: 64px; }
    .btn-add {
      width: 100%;
      padding: 11px;
      background: #1D9E75;
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.98); }

    /* BAR CHART */
    .bar-wrap { margin-bottom: 1.5rem; }
    .bar-wrap h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-label { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; text-align: right; }
    .bar-track { flex: 1; height: 10px; background: var(--bg3); border-radius: 5px; overflow: hidden; }
    .bar-fill { height: 100%; background: #1D9E75; border-radius: 5px; transition: width 0.4s ease; }
    .bar-amount { font-size: 12px; font-weight: 600; width: 70px; text-align: right; flex-shrink: 0; }

    /* ENTRIES */
    .entries-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .entries-header h2 { font-size: 15px; font-weight: 600; }
    .filter-select {
      font-size: 12px; padding: 5px 10px;
      border-radius: var(--radius); border: 0.5px solid var(--border);
      background: var(--bg); color: var(--text2);
    }

    .entry {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    .entry-icon {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .entry-body { flex: 1; min-width: 0; }
    .entry-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .entry-amount { font-size: 16px; font-weight: 600; color: var(--green); }
    .entry-date { font-size: 12px; color: var(--text2); white-space: nowrap; }
    .entry-cat {
      display: inline-block;
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 99px;
      margin-top: 4px; margin-bottom: 2px;
    }
    .entry-goal { font-size: 11px; color: var(--text2); margin-left: 6px; }
    .entry-desc { font-size: 13px; color: var(--text2); margin-top: 4px; }

    .btn-del {
      background: none;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-del:hover { border-color: #E24B4A; color: #A32D2D; }

    .empty {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--text2); font-size: 14px; line-height: 1.7;
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <h1>Mon tracker d'épargne</h1>
    <p id="start-label">Démarré le 20 mars 2026</p>
  </div>

  <div class="stats-grid">
    <div class="stat">
      <div class="stat-label">Total économisé</div>
      <div class="stat-value green" id="stat-total">0 Ar</div>
    </div>
    <div class="stat">
      <div class="stat-label">Nb d'entrées</div>
      <div class="stat-value blue" id="stat-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Moy. par entrée</div>
      <div class="stat-value" id="stat-avg">0 Ar</div>
    </div>
  </div>

  <div class="form-card">
    <h2>Ajouter une économie</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Montant (Ar)</label>
        <input type="number" id="inp-amount" placeholder="ex: 5000" min="0" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="inp-date" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Catégorie</label>
        <select id="inp-cat">
          <option value="alimentation">🛒 Alimentation</option>
          <option value="transport">🚌 Transport</option>
          <option value="loisirs">🎮 Loisirs</option>
          <option value="sante">💊 Santé</option>
          <option value="maison">🏠 Maison</option>
          <option value="autre" selected>💡 Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label>Comment tu as économisé ?</label>
        <select id="inp-goal">
          <option value="">— facultatif —</option>
          <option value="evite">Achat évité</option>
          <option value="promo">Promo saisie</option>
          <option value="cuisine">Cuisiné maison</option>
          <option value="marche">À pied plutôt</option>
          <option value="autre">Autre astuce</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group form-full">
        <label>Description (optionnelle)</label>
        <textarea id="inp-desc" placeholder="Raconte comment tu as économisé..."></textarea>
      </div>
    </div>
    <button class="btn-add" onclick="addEntry()">+ Enregistrer cette économie</button>
  </div>

  <div id="bar-section" class="bar-wrap" style="display:none;">
    <h2>Par catégorie</h2>
    <div id="bar-chart"></div>
  </div>

  <div class="entries-header">
    <h2>Historique</h2>
    <select class="filter-select" id="filter-cat" onchange="render()">
      <option value="">Toutes catégories</option>
      <option value="alimentation">Alimentation</option>
      <option value="transport">Transport</option>
      <option value="loisirs">Loisirs</option>
      <option value="sante">Santé</option>
      <option value="maison">Maison</option>
      <option value="autre">Autre</option>
    </select>
  </div>
  <div id="entries-list"></div>

</div>

<script>
  const CATS = {
    alimentation: { label: 'Alimentation', icon: '🛒', bg: '#EAF3DE', color: '#3B6D11' },
    transport:    { label: 'Transport',    icon: '🚌', bg: '#E6F1FB', color: '#185FA5' },
    loisirs:      { label: 'Loisirs',      icon: '🎮', bg: '#FAEEDA', color: '#854F0B' },
    sante:        { label: 'Santé',        icon: '💊', bg: '#FBEAF0', color: '#993556' },
    maison:       { label: 'Maison',       icon: '🏠', bg: '#EEEDFE', color: '#534AB7' },
    autre:        { label: 'Autre',        icon: '💡', bg: '#F1EFE8', color: '#5F5E5A' },
  };

  const GOALS = {
    evite:   'Achat évité',
    promo:   'Promo saisie',
    cuisine: 'Cuisiné maison',
    marche:  'À pied plutôt',
    autre:   'Autre astuce',
  };

  const STORAGE_KEY = 'epargne_entries_v1';

  let entries = [];

  function fmt(n) {
    return Math.round(n).toLocaleString('fr-MG') + ' Ar';
  }

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function fmtDate(s) {
    if (!s) return '';
    const [y, m, d] = s.split('-');
    return d + '/' + m + '/' + y;
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    } catch(e) { entries = []; }
    render();
  }

  function addEntry() {
    const amount = parseFloat(document.getElementById('inp-amount').value);
    if (!amount || amount <= 0) { alert('Veuillez entrer un montant valide !'); return; }
    const date  = document.getElementById('inp-date').value || todayStr();
    const cat   = document.getElementById('inp-cat').value;
    const goal  = document.getElementById('inp-goal').value;
    const desc  = document.getElementById('inp-desc').value.trim();

    entries.unshift({ id: Date.now(), amount, date, cat, goal, desc });
    save();
    render();

    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-desc').value   = '';
    document.getElementById('inp-goal').value   = '';
    document.getElementById('inp-date').value   = todayStr();
  }

  function deleteEntry(id) {
    if (!confirm('Supprimer cette entrée ?')) return;
    entries = entries.filter(e => e.id !== id);
    save();
    render();
  }

  function render() {
    const filter   = document.getElementById('filter-cat').value;
    const filtered = filter ? entries.filter(e => e.cat === filter) : entries;

    // Stats
    const total = entries.reduce((s, e) => s + e.amount, 0);
    const avg   = entries.length ? total / entries.length : 0;
    document.getElementById('stat-total').textContent = fmt(total);
    document.getElementById('stat-count').textContent = entries.length;
    document.getElementById('stat-avg').textContent   = fmt(avg);

    // Bar chart
    const barSection = document.getElementById('bar-section');
    if (entries.length > 0) {
      barSection.style.display = '';
      const bycat = {};
      entries.forEach(e => { bycat[e.cat] = (bycat[e.cat] || 0) + e.amount; });
      const maxVal = Math.max(...Object.values(bycat));
      document.getElementById('bar-chart').innerHTML = Object.entries(bycat)
        .sort((a, b) => b[1] - a[1])
        .map(([cat, val]) => {
          const c   = CATS[cat] || CATS.autre;
          const pct = maxVal > 0 ? Math.round(val / maxVal * 100) : 0;
          return `<div class="bar-row">
            <div class="bar-label">${c.icon} ${c.label}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="bar-amount">${fmt(val)}</div>
          </div>`;
        }).join('');
    } else {
      barSection.style.display = 'none';
    }

    // Entries
    const list = document.getElementById('entries-list');
    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty">${
        entries.length === 0
          ? 'Aucune économie enregistrée encore.<br>Ajoute ta première !'
          : 'Rien dans cette catégorie.'
      }</div>`;
      return;
    }

    list.innerHTML = filtered.map(e => {
      const c        = CATS[e.cat] || CATS.autre;
      const goalText = e.goal ? `<span class="entry-goal">· ${GOALS[e.goal] || ''}</span>` : '';
      const descHtml = e.desc ? `<div class="entry-desc">${e.desc}</div>` : '';
      return `<div class="entry">
        <div class="entry-icon">${c.icon}</div>
        <div class="entry-body">
          <div class="entry-top">
            <span class="entry-amount">${fmt(e.amount)}</span>
            <span class="entry-date">${fmtDate(e.date)}</span>
          </div>
          <span class="entry-cat" style="background:${c.bg};color:${c.color}">${c.label}</span>${goalText}
          ${descHtml}
        </div>
        <button class="btn-del" onclick="deleteEntry(${e.id})">suppr.</button>
      </div>`;
    }).join('');
  }

  // Init
  document.getElementById('inp-date').value = todayStr();
  load();
</script>

</body>
</html>
